{% extends 'base.html' %}
{% block title %}Login — ShopKart{% endblock %}
{% block content %}
<div class="container mt-5" style="max-width:420px;">
  <div class="card shadow">
    <div class="card-body p-4">
      <h4 class="fw-bold mb-1">Login</h4>
      <p class="text-muted small mb-4">Welcome back to ShopKart</p>
      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-danger py-2">{{ msg }}</div>
        {% endfor %}
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-warning w-100 fw-bold">
          <i class="bi bi-box-arrow-in-right"></i> Login
        </button>
      </form>
      <p class="text-center mt-3 small">
        New to ShopKart? <a href="{% url 'accounts:register' %}">Create an account</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
