{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Register — ShopKart{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width:500px;">
  <div class="card shadow">
    <div class="card-body p-4">
      <h4 class="fw-bold mb-1">Create Account</h4>
      <p class="text-muted small mb-4">Join millions of shoppers on ShopKart</p>
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-warning w-100 fw-bold mt-2">
          <i class="bi bi-person-plus"></i> Create Account
        </button>
      </form>
      <p class="text-center mt-3 small">
        Already have an account? <a href="{% url 'accounts:login' %}">Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
